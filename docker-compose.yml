version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel-backend
    volumes:
      - ./backend:/var/www/html
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: sh -c "composer install --no-interaction --prefer-dist --no-dev || true; php artisan migrate --force || true; php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    image: node:20
    container_name: next-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"

  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:

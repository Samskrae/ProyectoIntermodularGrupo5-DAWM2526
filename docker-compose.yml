services:
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: backend
    volumes:
      - ./backend:/var/www/html
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy # El backend esperará a que la DB esté LISTA, no solo encendida
    command: sh -c "php artisan migrate --force; php -S 0.0.0.0:8000 -t public"
    # Nota: He quitado el || true para que si la migración falla, sepas POR QUÉ falló.

  frontend:
    image: node:20
    container_name: frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ~/.npm:/root/.npm
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1

  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always # Añadido para mayor estabilidad
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      # Cambiamos a un volumen de carpeta local para que PUEDAS VER los datos en tu PC
      - ./docker/mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
